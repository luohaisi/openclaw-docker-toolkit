name: OpenClaw Docker 镜像导出

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Image name"
        required: true
        default: "ghcr.io/openclaw/openclaw"
      tag:
        description: "Image tag"
        required: true
        default: "2026.4.15-slim"

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Pull image
        run: |
          docker pull "${{ inputs.image }}:${{ inputs.tag }}"

      - name: Save to tar.gz
        run: |
          docker save "${{ inputs.image }}:${{ inputs.tag }}" -o openclaw.tar
          gzip openclaw.tar

      - name: Upload to Aliyun OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
        run: |
          set -euo pipefail
          if [ -z "$OSS_ACCESS_KEY_ID" ] || [ -z "$OSS_ACCESS_KEY_SECRET" ] || [ -z "$OSS_ENDPOINT" ] || [ -z "$OSS_BUCKET" ]; then
            echo "Missing OSS secrets. Please set OSS_ACCESS_KEY_ID / OSS_ACCESS_KEY_SECRET / OSS_ENDPOINT / OSS_BUCKET."
            exit 1
          fi
          # 不要用 alicdn 直链 wget：Actions 上常返回 HTTP 错误（wget exit 8）
          # 注意：v1.7.19 在 GitHub Release 上 assets 为空，linux-amd64.zip 会 404，故固定用 v1.7.18
          # 参见：https://github.com/aliyun/ossutil/releases
          OSSUTIL_VER="v1.7.18"
          curl -fsSL --retry 5 --retry-delay 2 \
            "https://github.com/aliyun/ossutil/releases/download/${OSSUTIL_VER}/ossutil-${OSSUTIL_VER}-linux-amd64.zip" \
            -o ossutil.zip
          rm -rf ossutil-extract
          mkdir -p ossutil-extract
          unzip -o -q ossutil.zip -d ossutil-extract
          OSSUTIL_BIN="$(find ossutil-extract -type f -name ossutil64 | head -1)"
          if [ -z "$OSSUTIL_BIN" ]; then
            OSSUTIL_BIN="$(find ossutil-extract -type f -name ossutil | head -1)"
          fi
          if [ -z "$OSSUTIL_BIN" ]; then
            echo "ossutil binary not found after unzip; listing:" >&2
            find ossutil-extract -type f >&2 || true
            exit 1
          fi
          chmod +x "$OSSUTIL_BIN"
          "$OSSUTIL_BIN" config -e "$OSS_ENDPOINT" -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET"
          OSS_OBJECT="docker-images/openclaw-${{ inputs.tag }}.tar.gz"
          "$OSSUTIL_BIN" cp openclaw.tar.gz "oss://${OSS_BUCKET}/${OSS_OBJECT}"
          echo "Download URL: https://${OSS_BUCKET}.${OSS_ENDPOINT}/${OSS_OBJECT}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-image-${{ inputs.tag }}
          path: openclaw.tar.gz
          retention-days: 5
